version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: exam-secrecy-db
    environment:
      POSTGRES_USER: exam_admin
      POSTGRES_PASSWORD: exam_secret_2024
      POSTGRES_DB: exam_secrecy
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam_admin -d exam_secrecy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
